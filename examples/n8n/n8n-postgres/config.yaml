service:
  name: Postgres
  image: ghcr.io/railwayapp-templates/postgres-ssl:16

deploy:
  startCommand: "/bin/sh -c 'unset PGPORT; docker-entrypoint.sh postgres --port=5432'"
  restartPolicyType: ON_FAILURE
  restartPolicyMaxRetries: 10
  numReplicas: 1

networking:
  tcpProxyPort: 5432

volume:
  mountPath: /var/lib/postgresql/data

variables:
  # Database credentials
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: "${RAILCTL_POSTGRES_PASSWORD}"
  POSTGRES_DB: railway
  
  # PostgreSQL client variables
  PGUSER: postgres
  PGPASSWORD: "${RAILCTL_POSTGRES_PASSWORD}"
  PGDATABASE: railway
  PGHOST: postgres.railway.internal
  PGPORT: "5432"
  PGDATA: /var/lib/postgresql/data/pgdata
  
  # Connection URL
  DATABASE_URL: "postgres://postgres:${RAILCTL_POSTGRES_PASSWORD}@postgres.railway.internal:5432/railway"
  
  # SSL certificate validity
  SSL_CERT_DAYS: "820"
