name: Close Stale Issues
on:
  schedule:
    - cron: '0 0 * * *'
permissions:
  issues: write
  pull-requests: write
jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@28ca1036281a5e5922ead5184a1bbf96e5fc984e # v9.0.0
        with:
          days-before-stale: 90
          days-before-close: 14
          stale-issue-message: 'This issue has been inactive for 90 days and will be closed in 14 days if there is no further activity.'
          stale-pr-message: 'This PR has been inactive for 90 days and will be closed in 14 days if there is no further activity.'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'priority:high,pinned,security'
          exempt-pr-labels: 'pinned,security'
