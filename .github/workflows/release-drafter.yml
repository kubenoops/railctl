name: Release Drafter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  update_release_draft:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Update release draft
        run: |
          # Delete existing draft (if any) so we recreate with fresh notes
          DRAFT_TAG=$(gh release list --json tagName,isDraft \
            -q '.[] | select(.isDraft) | .tagName' --limit 1)

          if [ -n "$DRAFT_TAG" ]; then
            gh release delete "$DRAFT_TAG" --yes
          fi

          # Calculate next version from latest tag
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"

          # Create draft with auto-generated categorized notes
          gh release create "$NEXT" \
            --draft \
            --title "v${MAJOR}.${MINOR}.$((PATCH + 1))" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
