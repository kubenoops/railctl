name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['bug']
  - title: '📚 Documentation'
    labels: ['documentation']
  - title: '🔧 Maintenance'
    labels: ['refactor', 'infra']
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['minor', 'feature', 'enhancement']
  patch:
    labels: ['patch', 'bug', 'documentation']
  default: patch
template: |
  ## Changes
  $CHANGES
